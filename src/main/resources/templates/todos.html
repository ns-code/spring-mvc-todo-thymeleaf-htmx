<!DOCTYPE html>

<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Todos</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script th:src="@{/webjars/bootstrap/5.3.8/js/bootstrap.bundle.min.js}" defer></script>
    <script src="https://unpkg.dev/htmx.org@2.0.10"></script>
    <style>
        .usage {
            background-color: lightgray;
        }

        .todos {
            margin-top: 50px;
            margin-left: 50px;
            width: 40%;
        }

        .todo-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .todo-title-container {
            position: relative;
            display: inline-block;
        }

        .delete-mark {
            display: none !important;
            margin-left: 8px;
            cursor: pointer;
            font-size: 0.9em;
            vertical-align: -0.125em;
        }

        .todo-title-container:hover .delete-mark {
            display: inline-block !important;
            color: red;
        }

        .inline-edit-form {
            display: inline;
        }
    </style>
</head>

<body>

    <div class="todos">
        <div class="usage">
            <strong>Usage:</strong>
            <ol>
                <li> Enter a todo item and Add </li>
                <li> Click on a todo item text to edit and Save</li>
                <li> Hover over the listed todo item to delete</li>
            </ol>
        </div>

        <h2>
            Todos
        </h2>
        <div id="categoryFilterContainer">
            Categories: <select id="categoryFilter" name="categoryId" hx-get="/todos/selectedCategory"
                hx-target=".todo-items" hx-trigger="change">
                <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"
                    th:selected="${cat.id == selectedCategoryId}">Category</option>
            </select>
        </div>

        <div class="todo todo-items" id="todoItemsContainer">
            <div th:fragment="list-frag" th:each="todo : ${todos}" class="todo-itm">
                <span th:text="${todo.id}">ID</span> |
                <div th:class="|todo-title-container  todo-item-${todo.id}|">

                    <span th:fragment="display">
                        <span class="display-todo" th:hx-get="@{/todos/edit-title/{id}(id=${todo.id})}" hx-target="this"
                            hx-swap="outerHTML" style="cursor:pointer">
                            <span th:text="${todo.title}">title</span>
                        </span>
                    </span>
                    <span>
                        <i class="bi bi-x-circle delete-mark" th:data-todo-id="${todo.id}"
                            onclick="openDeleteModal(this)" title="Delete todo">
                        </i>
                    </span>

                </div>
            </div>
        </div>

        <h2>Add a Todo</h2>
        <div id="addTodoContainer">
            <div id="todos-form" th:fragment="add-frag" hx-swap-oob="true">
                <form hx-post="/todos" hx-target=".todo-items">
                    <input type="hidden" name="categoryId" id="categoryId" th:fragment="selectedCategoryId"
                        th:value="${selectedCategoryId}">
                    <input type="text" name="new-todo" id="new-todo" th:value="${newTodo}" required>
                    <button class="btn btn-primary btn-sm" id="add-todo-btn">Add</button>
                </form>
            </div>
        </div>
    </div>


    <div class="modal fade" id="confirmDeleteModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Confirm Delete</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    Are you sure you want to delete this todo?
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" id="confirmDeleteBtn" class="btn btn-danger">Delete</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let todoIdToDelete = null;

        function openDeleteModal(el) {
            todoIdToDelete = el.dataset.todoId;

            const modal = new bootstrap.Modal(document.getElementById('confirmDeleteModal'));
            modal.show();
        }

        document.getElementById("confirmDeleteBtn").addEventListener("click", function () {
            if (!todoIdToDelete) return;

            // Fire HTMX delete request
            htmx.ajax('DELETE', `/todos/${todoIdToDelete}`, {
                target: '.todo-items',
                swap: 'innerHTML'
            });
            // Close modal
            const modalEl = document.getElementById('confirmDeleteModal');
            bootstrap.Modal.getInstance(modalEl).hide();
        });
    </script>
</body>

</html>
