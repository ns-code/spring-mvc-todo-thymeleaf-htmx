
<th:block class="todo todo-items">    
    <div class="todo-itm" th:fragment="list-frag" th:each="todo : ${todos}">
            <span th:text="${todo.id}">ID</span> |
            <div th:class="|todo-title-container  todo-item-${todo.id}|">

                <span th:fragment="display">
                    <span th:hx-get="@{/todos/edit-title/{id}(id=${todo.id})}" hx-target="this" hx-swap="outerHTML"
                        style="cursor:pointer">
                        <span th:text="${todo.title}">title</span>
                    </span>
                </span>
                <span>
                    <i class="bi bi-x-circle delete-mark" th:data-todo-id="${todo.id}" onclick="openDeleteModal(this)"
                        title="Delete todo">
                    </i>
                </span>

            </div>
    </div>
</th:block>
