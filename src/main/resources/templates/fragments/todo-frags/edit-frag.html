<th:block th:fragment="edit">
    <form class="inline-edit-form"
          th:hx-post="@{/todos/update-title/{id}(id=${todo.id})}"
          hx-target="this"
          hx-on="click: this.classList.toggle('clicked')"
          hx-swap="outerHTML">
        <input id="edit-todo" type="text" name="title" th:value="${todo.title}" autofocus>
        <button id="save-todo" type="submit">Save</button>
    </form>
</th:block>
