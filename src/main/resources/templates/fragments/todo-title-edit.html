<span th:fragment="edit">
    <form class="inline-edit-form"
          th:hx-post="@{/todos/update-title/{id}(id=${todo.id})}"
          hx-target="this"
          hx-on="click: this.classList.toggle('clicked')"
          hx-swap="outerHTML">
        <input type="text" name="title" th:value="${todo.title}" autofocus>
        <button type="submit">Save</button>
    </form>
</span>
